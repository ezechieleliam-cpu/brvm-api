<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  let fullData = [];

  async function refreshData() {
    try {
      const res = await fetch("/refresh-data");
      const json = await res.json();
      console.log("📦 Données reçues:", json); // ✅ Ici

      if (!json.data || !Array.isArray(json.data)) {
        console.error("❌ Format inattendu:", json);
        return;
      }

      fullData = json.data;
      renderTable(fullData);
      renderChart(fullData);
    } catch (error) {
      console.error("💥 Erreur lors du chargement des données:", error);
    }
  }

  function renderTable(data) {
    const tbody = document.querySelector("#stocks-table tbody");
    tbody.innerHTML = "";
    data.forEach(stock => {
      const row = `<tr>
        <td>${stock?.symbol || "-"}</td>
        <td>${stock?.name || "-"}</td>
        <td>${stock?.volume || "-"}</td>
        <td>${stock?.close || "-"}</td>
        <td>${stock?.variation || "-"}</td>
      </tr>`;
      tbody.innerHTML += row;
    });
  }

  function renderChart(data) {
    const labels = data.map(s => s.symbol || "-");
    const variations = data.map(s => {
      const raw = s.variation?.replace(",", ".") || "0";
      return parseFloat(raw) || 0;
    });

    const ctx = document.getElementById("variationChart").getContext("2d");
    new Chart(ctx, {
      type: "bar",
      data: {
        labels: labels,
        datasets: [{
          label: "Variation (%)",
          data: variations,
          backgroundColor: variations.map(v => v >= 0 ? "#2ecc71" : "#e74c3c")
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { display: false },
          tooltip: { mode: "index", intersect: false }
        },
        scales: {
          y: { beginAtZero: true }
        }
      }
    });
  }

  function filterTable() {
    const query = document.getElementById("search").value.toLowerCase();
    const filtered = fullData.filter(stock =>
      (stock.name || "").toLowerCase().includes(query) ||
      (stock.symbol || "").toLowerCase().includes(query)
    );
    renderTable(filtered);
  }

  function exportCSV() {
    const rows = [["Symbole", "Nom", "Volume", "Clôture", "Variation"]];
    fullData.forEach(stock => {
      rows.push([
        stock?.symbol || "-",
        stock?.name || "-",
        stock?.volume || "-",
        stock?.close || "-",
        stock?.variation || "-"
      ]);
    });
    const csvContent = rows.map(e => e.join(",")).join("\n");
    const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "brvm_actions.csv";
    link.click();
  }

  refreshData(); // auto-load on page open
  setInterval(refreshData, 60000); // actualise toutes les 60 secondes
</script>
